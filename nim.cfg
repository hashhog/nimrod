# nimrod build configuration
# Performance-optimized settings for Bitcoin full node
#
# System dependencies (install before building):
#   sudo apt install -y libsecp256k1-dev librocksdb-dev libsnappy-dev \
#     liblz4-dev libsqlite3-dev zlib1g-dev

# Threading and memory management
--threads:on
--mm:arc

# Library linkage (uses system-installed libraries)
--passL:"-lsecp256k1"
--passL:"-lrocksdb"
--passL:"-lstdc++"
--passL:"-lpthread"
--passL:"-lz"
--passL:"-lsnappy"
--passL:"-llz4"
--passL:"-lsqlite3"

# secp256k1 FFI
--define:useSystemSecp256k1

# Optimization - use with -d:release
@if release:
  --opt:speed
  --passC:"-O3"
  --passC:"-march=native"
@end

# Profiling support - compile with -d:profile
@if profile:
  --profiler:on
  --stackTrace:on
@end

# Debug builds
@if debug:
  --debugger:native
  --stackTrace:on
  --lineTrace:on
@end
