# nimrod build configuration
# Performance-optimized settings for Bitcoin full node

# Threading and memory management
--threads:on
--mm:arc

# Library paths for local builds
--passL:"-L/home/max/hashhog/lunarblock/lib"
--passL:"-L/home/max/hashhog/beamchain/_build/default/lib/rocksdb/_build/cmake/rocksdb-prefix/src/rocksdb-build"
--passL:"-Wl,-rpath,/home/max/hashhog/lunarblock/lib"

# Library linkage
--passL:"-lsecp256k1"
--passL:"-lrocksdb"
--passL:"-lstdc++"
--passL:"-lpthread"
--passL:"-lz"
--passL:"-lsnappy"
--passL:"-llz4"

# secp256k1 FFI
--define:useSystemSecp256k1

# Optimization - use with -d:release
@if release:
  --opt:speed
  --passC:"-O3"
  --passC:"-march=native"
@end

# Profiling support - compile with -d:profile
@if profile:
  --profiler:on
  --stackTrace:on
@end

# Debug builds
@if debug:
  --debugger:native
  --stackTrace:on
  --lineTrace:on
@end
