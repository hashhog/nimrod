name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (linux-amd64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jiro4989/setup-nim-action@v2
      - run: nimble setup -y
      - run: nimble build -d:release -y
      - name: Package
        run: cp bin/nimrod nimrod-linux-amd64
      - uses: actions/upload-artifact@v4
        with:
          name: nimrod-linux-amd64
          path: nimrod-linux-amd64

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
