# nimrod configuration file
# Lines starting with # are comments

# Data directory (default: ~/.nimrod)
# datadir=/path/to/data

# Network: mainnet, testnet3, regtest (default: mainnet)
# network=mainnet

# P2P port (default: 8333 for mainnet, 18333 for testnet, 18444 for regtest)
# port=8333

# RPC port (default: 8332 for mainnet, 18332 for testnet, 18443 for regtest)
# rpcport=8332

# Disable RPC server
# norpc=1

# Maximum peer connections (default: 125)
# maxconnections=125

# Log level: trace, debug, info, warn, error (default: info)
# loglevel=info

# Add a peer to connect to
# addnode=192.168.1.1:8333

# Whitelist an IP address (exempt from DoS limits)
# whitelist=192.168.1.0/24

# Enable pruning (only keep last N blocks)
# prune=550

# Run in the background as a daemon
# daemon=1
